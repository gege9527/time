name: test time                            # 工作流名称

on:                                        # 触发器配置
  workflow_dispatch:                       # 允许手动触发工作流
  push:                                    # push 到仓库时触发
    branches: [ main ]                     # 可选：限制只在 main 分支 push 时触发
  schedule:                                # 定时触发配置
    - cron: 10 16 * * *                    # 每天 UTC 16:10 执行（北京时间 00:10）

jobs:
  run:                                     # 作业名称
    runs-on: ubuntu-latest                 # 运行环境：最新版 Ubuntu
    steps:                                 # 执行步骤
      - name: Checkout                     # 步骤1：检出代码
        uses: actions/checkout@v4          # 将代码仓库检出到 runner

      - name: Set up Node                  # 步骤2：设置 Node.js 环境
        uses: actions/setup-node@v3        # 使用官方 Node.js 设置 action
        with:
          node-version: 18                 # 指定 Node.js 版本为 18
      
      - name: Install dependencies         # 步骤3：安装项目依赖
        run: npm ci                        # 使用 npm ci 进行干净的依赖安装
      
      - name: Run main script              # 步骤4：执行主程序
        run: npm run main                  # 运行 package.json 中定义的 main 脚本
        env:                               # 环境变量配置
          TOKEN: ${{ secrets.TOKEN }}    # 从 GitHub Secrets 获取 TOKEN 环境变量
          NOTIFY: ${{ secrets.NOTIFY }}    # 从 GitHub Secrets 获取 NOTIFY 环境变量